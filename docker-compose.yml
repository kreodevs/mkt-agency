services:
  # === PostgreSQL ===
  mkt-agency-db:
    image: postgres:16-alpine
    container_name: mkt-agency-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mktos
      POSTGRES_USER: mktos
      POSTGRES_PASSWORD: b8a200ab5a5ddcfdceef3a878361d5215cb3f72c4c1c71d6
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mktos -d mktos']
      interval: 10s
      timeout: 5s
      retries: 5

  # === Backend (NestJS production) ===
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mktos-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mkt-agency-db
      DB_PORT: 5432
      DB_NAME: mktos
      DB_USER: mktos
      DB_PASSWORD: b8a200ab5a5ddcfdceef3a878361d5215cb3f72c4c1c71d6
      JWT_SECRET: ee21996eb4f45304098667815c8dad9ada518b2f008df4eadd61541c4f9c03de
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: '*'
      # AI Provider (OpenAI-compatible — OpenRouter, LemonData, etc.)
      AI_API_URL: ${AI_API_URL:-https://openrouter.ai/api/v1}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-v4-flash}
    volumes:
      - uploads:/app/uploads
    depends_on:
      mkt-agency-db:
        condition: service_healthy

  # === Frontend (Nginx) ===
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mktos-frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
