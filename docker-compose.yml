services:
  # === PostgreSQL ===
  mkt-agency-db:
    image: postgres:16-alpine
    container_name: mkt-agency-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mktos
      POSTGRES_USER: mktos
      POSTGRES_PASSWORD: mktos_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mktos -d mktos']
      interval: 10s
      timeout: 5s
      retries: 5

  # === Backend (NestJS production) ===
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mktos-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mkt-agency-db
      DB_PORT: 5432
      DB_NAME: mktos
      DB_USER: mktos
      DB_PASSWORD: mktos_secret
      JWT_SECRET: dev_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: '*'
    volumes:
      - uploads:/app/uploads
    depends_on:
      mkt-agency-db:
        condition: service_healthy

  # === Frontend (Nginx) ===
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mktos-frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
