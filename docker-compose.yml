services:
  # Desarrollo local — producción Dokploy: docker-compose.dokploy.yml
  # MinIO persiste en ./data/minio (override con MINIO_DATA_DIR en .env)
  postgres:
    image: postgres:16-alpine
    container_name: mkt-agency-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-mktos}
      POSTGRES_USER: ${DB_USER:-mktos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: mkt-agency-redis
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        DATA_DIR=/data
        echo "[redis-entrypoint] Starting Redis quarantine check" >&2
        if [ -f "$$DATA_DIR/appendonly.aof.manifest" ] || [ -f "$$DATA_DIR/appendonly.aof" ] || [ -f "$$DATA_DIR/dump.rdb" ]; then
          ts=$$(date +%s)
          backup="$$DATA_DIR/.legacy-persistence-$$ts"
          mkdir -p "$$backup"
          echo "[redis-entrypoint] Quarantining legacy Redis persistence to $$backup" >&2
          find "$$DATA_DIR" -maxdepth 1 \( -name 'appendonly.aof' -o -name 'appendonly.aof.*' -o -name 'dump.rdb' \) -exec mv {} "$$backup/" \;
        fi
        echo "[redis-entrypoint] Launching redis-server" >&2
        exec redis-server --appendonly no --save "" --dir /data
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping 2>/dev/null | grep -Eq '^(PONG|LOADING)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: mkt-agency-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - ${MINIO_DATA_DIR:-./data/minio}:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: mkt-agency-minio-init
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-mkt-agency-assets}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"
        mc mb "local/$$S3_BUCKET" --ignore-existing

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mkt-agency-api
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-mkt-agency-assets}
      S3_REGION: ${S3_REGION:-us-east-1}
    expose:
      - "3000"
    # Opcional: acceso directo a la API en el host (evita choque con `yarn start:dev` en 3000)
    ports:
      - "${API_PUBLISH_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/setup/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mkt-agency-worker
    env_file: .env
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-mkt-agency-assets}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mkt-agency-frontend
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
