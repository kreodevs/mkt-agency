server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # Onboarding complete: can take longer due to IA processing + agent activation
  # Regex locations must appear before generic prefix /api/ for priority
  location ~ ^/api/v1/products/[a-f0-9-]+/onboarding/complete$ {
    proxy_pass http://mkt-agency-api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 180s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 180s;
  }

  # Competitor discovery: Tavily web search + LLM ranking can exceed default 60s
  location = /api/v1/competitors/discover {
    proxy_pass http://mkt-agency-api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 180s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 180s;
  }

  # Upstream must NOT be "api": other stacks on dokploy-network (e.g. eventos) also
  # register that alias and nginx would proxy to the wrong backend.
  location /api/ {
    proxy_pass http://mkt-agency-api:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Default timeouts
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # Static build assets — never fall back to index.html (avoids MIME text/html on missing chunks).
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  location = /version.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  # PWA: service worker and version manifest must never be cached across deploys.
  location ~* ^/(sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }
}
