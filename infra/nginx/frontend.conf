server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # Upstream must NOT be "api": other stacks on dokploy-network (e.g. eventos) also
  # register that alias and nginx would proxy to the wrong backend.
  location /api/ {
    proxy_pass http://mkt-agency-api:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
