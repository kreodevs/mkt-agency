# Producción en Dokploy — Compose Type
# Docs: infra/dokploy/README.md
#
# - Sin container_name (recomendación Dokploy)
# - Red externa dokploy-network para Traefik
# - Red internal para postgres/redis/minio/api
# - MinIO: bind mount host MINIO_DATA_DIR (default /var/lib/mkt-agency/minio)
# - Dominios: configurar en Dokploy UI → Domains (servicio frontend, puerto 80)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mktos}
      POSTGRES_USER: ${DB_USER:-mktos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping 2>/dev/null | grep -Eq '^(PONG|LOADING)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - ${MINIO_DATA_DIR:-/var/lib/mkt-agency/minio}:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-mkt-agency-assets}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"
        mc mb "local/$$S3_BUCKET" --ignore-existing
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    # Sin ports: — la API solo es accesible en la red internal (nginx → mkt-agency-api:3000)
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mktos}
      DB_USER: ${DB_USER:-mktos}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-mkt-agency-assets}
      S3_REGION: ${S3_REGION:-us-east-1}
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      DOMAIN_CNAME_TARGET: ${DOMAIN_CNAME_TARGET:-dashboard.mktagency.app}
      SKIP_OPERATIONAL_DATA_RESET: ${SKIP_OPERATIONAL_DATA_RESET:-true}
      SKIP_GENERATED_CONTENT_RESET: ${SKIP_GENERATED_CONTENT_RESET:-false}
      RUN_GENERATED_CONTENT_RESET: ${RUN_GENERATED_CONTENT_RESET:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/setup/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      internal:
        aliases:
          - mkt-agency-api

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mktos}
      DB_USER: ${DB_USER:-mktos}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-mkt-agency-assets}
      S3_REGION: ${S3_REGION:-us-east-1}
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_VERSION: ${APP_VERSION:-}
        DOKPLOY_COMMIT_HASH: ${DOKPLOY_COMMIT_HASH:-}
        DOKPLOY_COMMIT_SHA: ${DOKPLOY_COMMIT_SHA:-}
        SOURCE_COMMIT: ${SOURCE_COMMIT:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.services.mkt-agency-web.loadbalancer.server.port=80

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
