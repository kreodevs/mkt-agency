<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Plataforma de marketing para agencias" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Mkt Agency OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){var b="%BUILD_ID%";function c(){fetch("/version.json?t="+Date.now(),{cache:"no-store"}).then(function(r){return r.json()}).then(function(v){if(v.version&&v.version!==b){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(r){return r.unregister()})}).then(function(){window.location.reload()})}}).catch(function(){})}c();setInterval(c,6e4)})();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
