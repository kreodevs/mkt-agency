<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Plataforma de marketing para agencias" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mkt Agency" />
    <meta name="application-name" content="Mkt Agency OS" />
    <meta name="app-build" content="%BUILD_ID%" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Mkt Agency OS</title>
  </head>
  <body>
    <script>
      (function () {
        var KEY = 'mkt:pwa-reset:v5';
        if (localStorage.getItem(KEY) === 'done') return;
        if (!('serviceWorker' in navigator)) {
          localStorage.setItem(KEY, 'done');
          return;
        }
        if (localStorage.getItem(KEY) === 'pending') return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (!regs.length) {
            localStorage.setItem(KEY, 'done');
            return;
          }
          localStorage.setItem(KEY, 'pending');
          return Promise.all(regs.map(function (r) { return r.unregister(); }))
            .then(function () {
              if (!('caches' in window)) return;
              return caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              });
            })
            .then(function () {
              localStorage.setItem(KEY, 'done');
              location.reload();
            });
        }).catch(function () {
          localStorage.removeItem(KEY);
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
